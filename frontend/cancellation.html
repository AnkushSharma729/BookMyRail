<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookMyRail – Manage Ticket</title>
  <img src="img/logo 1.png" alt="logo" height="150px">
  <style>
    /* ===== Global Styles ===== */
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f8;
      color: #333;
      margin: 0;
      padding: 0;
    }

    header {
      background: #0077b6;
      color: #fff;
      text-align: center;
      padding: 1.5rem 0;
    }

    /* ===== Tabs ===== */
    .tab-container {
      text-align: center;
      margin-top: 20px;
    }

    .tab-btn {
      background: #0077b6;
      color: #fff;
      border: none;
      padding: 10px 20px;
      margin: 0 5px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s;
    }

    .tab-btn.active {
      background: #005f86;
    }

    /* ===== Form Styles ===== */
    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
    }

    form {
      background: #fff;
      max-width: 400px;
      margin: 30px auto;
      padding: 20px 30px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    form label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    form input,
    form select,
    form textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    form button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #0077b6;
      color: #fff;
      font-size: 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }

    form button:hover {
      background: #005f86;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #666;
      font-size: 14px;
    }
  </style>
  <script type="module" src="JS/cancellation.js"></script>
</head>
<body>

  <header>
    <h1>BookMyRail – Manage Ticket</h1>
  </header>

  <!-- Tabs for actions -->
  <div class="tab-container">
    <button class="tab-btn active" id="cancelTab">Cancel Ticket</button>
    <button class="tab-btn" id="rescheduleTab">Reschedule Ticket</button>
  </div>

  <main>
    <!-- ===== Cancel Form ===== -->
    <section id="cancelSection" class="form-section active">
      <form id="cancelForm">
        <label for="pnr">PNR Number</label>
        <input type="text" id="pnr" name="pnr" placeholder="Enter 10-digit PNR" required>

        <label for="email">Registered Email / Phone</label>
        <input type="text" id="email" name="email" placeholder="Enter email or phone" required>

        <label for="reason">Reason for Cancellation</label>
        <textarea id="reason" name="reason" rows="4" placeholder="Optional"></textarea>

        <button type="submit">Cancel Ticket</button>
      </form>
    </section>

    <!-- ===== Reschedule Form ===== -->
    <section id="rescheduleSection" class="form-section">
      <form id="rescheduleForm">
        <label for="pnrRes">PNR Number</label>
        <input type="text" id="pnrRes" name="pnrRes" placeholder="Enter 10-digit PNR" required>

        <label for="emailRes">Registered Email / Phone</label>
        <input type="text" id="emailRes" name="emailRes" placeholder="Enter email or phone" required>

        <label for="newDate">Select New Travel Date</label>
        <input type="date" id="newDate" name="newDate" required>

        <label for="newClass">Select New Class</label>
        <select id="newClass" name="newClass" required>
          <option value="">--Select--</option>
          <option value="Sleeper">Sleeper</option>
          <option value="3AC">3rd AC</option>
          <option value="2AC">2nd AC</option>
          <option value="1AC">1st AC</option>
        </select>

        <button type="submit">Reschedule Ticket</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 BookMyRail. All rights reserved.</p>
  </footer>

</body>
</html>
