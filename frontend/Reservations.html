<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Railway Booking System</title>
  <link rel="stylesheet" href="CSS/Reservations.css">
  <script type="module" src="JS/Reservations.js"></script>
  <img src="img/logo 1.png" alt="logo" height="150px" class="center-logo">

</head>
<body>
  <h1>Railway Ticket Booking</h1>

  <form id="bookingForm">
    <!-- From State -->
    <label for="from">From State:</label>
    <select id="from" name="from" required>
      <option value="">--Select State--</option>
      <option value="Andhra Pradesh">Andhra Pradesh</option>
      <option value="Assam">Assam</option>
      <option value="Bihar">Bihar</option>
      <option value="Chhattisgarh">Chhattisgarh</option>
      <option value="Delhi">Delhi</option>
      <option value="Goa">Goa</option>
      <option value="Gujarat">Gujarat</option>
      <option value="Haryana">Haryana</option>
      <option value="Himachal Pradesh">Himachal Pradesh</option>
      <option value="Jammu & Kashmir">Jammu & Kashmir</option>
      <option value="Jharkhand">Jharkhand</option>
      <option value="Karnataka">Karnataka</option>
      <option value="Kerala">Kerala</option>
      <option value="Madhya Pradesh">Madhya Pradesh</option>
      <option value="Maharashtra">Maharashtra</option>
      <option value="Manipur">Manipur</option>
      <option value="Meghalaya">Meghalaya</option>
      <option value="Mizoram">Mizoram</option>
      <option value="Nagaland">Nagaland</option>
      <option value="Odisha">Odisha</option>
      <option value="Punjab">Punjab</option>
      <option value="Rajasthan">Rajasthan</option>
      <option value="Sikkim">Sikkim</option>
      <option value="Tamil Nadu">Tamil Nadu</option>
      <option value="Telangana">Telangana</option>
      <option value="Tripura">Tripura</option>
      <option value="Uttar Pradesh">Uttar Pradesh</option>
      <option value="Uttarakhand">Uttarakhand</option>
      <option value="West Bengal">West Bengal</option>
    </select>
    <br><br>

    <!-- To State -->
    <label for="to">To State:</label>
    <select id="to" name="to" required>
      <option value="">--Select State--</option>
      <!-- same list reused -->
      <option value="Andhra Pradesh">Andhra Pradesh</option>
      <option value="Assam">Assam</option>
      <option value="Bihar">Bihar</option>
      <option value="Chhattisgarh">Chhattisgarh</option>
      <option value="Delhi">Delhi</option>
      <option value="Goa">Goa</option>
      <option value="Gujarat">Gujarat</option>
      <option value="Haryana">Haryana</option>
      <option value="Himachal Pradesh">Himachal Pradesh</option>
      <option value="Jammu & Kashmir">Jammu & Kashmir</option>
      <option value="Jharkhand">Jharkhand</option>
      <option value="Karnataka">Karnataka</option>
      <option value="Kerala">Kerala</option>
      <option value="Madhya Pradesh">Madhya Pradesh</option>
      <option value="Maharashtra">Maharashtra</option>
      <option value="Manipur">Manipur</option>
      <option value="Meghalaya">Meghalaya</option>
      <option value="Mizoram">Mizoram</option>
      <option value="Nagaland">Nagaland</option>
      <option value="Odisha">Odisha</option>
      <option value="Punjab">Punjab</option>
      <option value="Rajasthan">Rajasthan</option>
      <option value="Sikkim">Sikkim</option>
      <option value="Tamil Nadu">Tamil Nadu</option>
      <option value="Telangana">Telangana</option>
      <option value="Tripura">Tripura</option>
      <option value="Uttar Pradesh">Uttar Pradesh</option>
      <option value="Uttarakhand">Uttarakhand</option>
      <option value="West Bengal">West Bengal</option>
    </select>
    <br><br>

    <!-- Travel Date -->
    <label for="date">Date of Journey:</label>
    <input type="date" id="date" name="date" required>
    <br><br>

    <!-- Class -->
    <label for="class">Travel Class:</label>
    <select id="class" name="class" required>
      <option value="">--Select Class--</option>
      <option>Sleeper (SL)</option>
      <option>AC 3 Tier (3A)</option>
      <option>AC 2 Tier (2A)</option>
      <option>First Class (1A)</option>
    </select>
    <br><br>

    <!-- Passengers -->
    <label for="passengers">Number of Passengers:</label>
    <input type="number" id="passengers" name="passengers" min="1" max="6" required>
    <br><br>

    <!-- Contact -->
    <label for="name">Passenger Name:</label>
    <input type="text" id="name" name="name" required>
    <br><br>

    <label for="mobile">Mobile Number:</label>
    <input type="tel" id="mobile" name="mobile" pattern="[0-9]{10}" placeholder="10-digit number" required>
    <br><br>

    <button type="submit">Book Ticket</button>
  </form>
</body>
</html>
