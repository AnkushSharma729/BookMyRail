<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BookMyRail – Profile Account</title>
<img src="img/logo 1.png" alt="logo" height="150px">

  <link rel="stylesheet" href="CSS/Profile.css">
  <script type="module" src="JS/Profile.js"></script>
</head>
<body>

<header>
  <h1>BookMyRail – Profile Account</h1>
</header>

<form id="profileForm">
  <h2>User Information</h2>
  <div class="flex-row">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" required>
    </div>
    <div class="form-group">
      <label for="email">Email ID</label>
      <input type="email" id="email" required>
    </div>
  </div>

  <div class="flex-row">
    <div class="form-group">
      <label for="firstName">First Name</label>
      <input type="text" id="firstName" required>
    </div>
    <div class="form-group">
      <label for="lastName">Last Name</label>
      <input type="text" id="lastName" required>
    </div>
  </div>

  <div class="flex-row">
    <div class="form-group">
      <label for="gender">Gender</label>
      <select id="gender" required>
        <option value="">Select</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>
    </div>
    <div class="form-group">
      <label for="dob">Date of Birth</label>
      <input type="date" id="dob" required>
    </div>
  </div>

  <div class="flex-row">
    <div class="form-group">
      <label for="occupation">Occupation</label>
      <input type="text" id="occupation">
    </div>
    <div class="form-group">
      <label for="mobile">Mobile Number</label>
      <input type="text" id="mobile" maxlength="10" required>
    </div>
  </div>

  <div class="flex-row">
    <div class="form-group">
      <label for="nationality">Nationality</label>
      <input type="text" id="nationality" required>
    </div>
    <div class="form-group">
      <label for="marital">Marital Status</label>
      <select id="marital">
        <option value="">Select</option>
        <option>Single</option>
        <option>Married</option>
        <option>Other</option>
      </select>
    </div>
  </div>

  <h2>Address Details</h2>
  <div class="form-group">
    <label for="city">City</label>
    <input type="text" id="city" required>
  </div>
  <div class="flex-row">
    <div class="form-group">
      <label for="state">State</label>
      <input type="text" id="state" required>
    </div>
    <div class="form-group">
      <label for="pincode">Pin Code</label>
      <input type="text" id="pincode" maxlength="6" required>
    </div>
  </div>
  <div class="flex-row">
    <div class="form-group">
      <label for="country">Country</label>
      <input type="text" id="country" required>
    </div>
    <div class="form-group">
      <label for="phone">Phone Number</label>
      <input type="text" id="phone" maxlength="10">
    </div>
  </div>

  <div class="checkbox-group">
    <label>
      <input type="checkbox" id="sameAddress"> Present address is same as permanent address
    </label>
  </div>

  <h2>Security</h2>
  <div class="form-group captcha-box">
    <span class="captcha-display" id="captchaCode"></span>
    <button type="button" id="refreshCaptcha" style="width:auto;">Refresh</button>
  </div>
  <div class="form-group">
    <label for="captchaInput">Enter Captcha Code</label>
    <input type="text" id="captchaInput" required>
  </div>

  <button type="submit">Submit Profile</button>
</form>

</body>
</html>
