<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BookMyRail – Train Schedule</title>
  <img src="img/logo 1.png" alt="logo" height="150px">

  <link rel="stylesheet" href="CSS/TrainSchedule.css">
  <script type="module" src="JS/TrainSchedule.js"></script>
</head>
<body>

  <header>
    <h1>BookMyRail – Train Schedule</h1>
  </header>

  <main>
    <form id="scheduleForm" class="schedule-form">
      <label for="trainNumber">Train Number</label>
      <input type="text" id="trainNumber" name="trainNumber" placeholder="e.g. 12627" required>

      <label for="trainName">Train Name</label>
      <input type="text" id="trainName" name="trainName" placeholder="e.g. Karnataka Express" required>

      <label for="date">Travel Date</label>
      <input type="date" id="date" name="date" required>

      <button type="submit">Check Schedule</button>
    </form>

    <div id="result"></div>
  </main>

  <footer>
    <p>&copy; 2025 BookMyRail. All rights reserved.</p>
  </footer>

</body>
</html>
